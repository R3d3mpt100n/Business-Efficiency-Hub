kind = "web"
      previewPath = "/"
      title = "Small Business Systems Docs"
      version = "1.0.0"
      id = "artifacts/docs"
      router = "path"

      [[integratedSkills]]
      name = "react-vite"
      version = "1.0.0"

      [[services]]
      name = "web"
      paths = [ "/" ]
      localPort = 21121

      [services.development]
      run = "pnpm --filter @workspace/docs run dev"

      [services.production.build]
      args = ["pnpm", "--filter", "@workspace/docs", "run", "build"]

      [services.production.run]
      args = ["node", "artifacts/docs/start.mjs"]

      [services.production.run.env]
      PORT = "21121"
      BASE_PATH = "/"
      REPLIT_DEPLOYMENT = "1"
      NODE_ENV = "production"

      [services.env]
      PORT = "21121"
      BASE_PATH = "/"
