kind = "web"
previewPath = "/"
title = "Small Business Systems Docs"
version = "1.0.0"
id = "artifacts/docs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21121

[services.development]
run = "pnpm --filter @workspace/docs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docs", "run", "build" ]
publicDir = "artifacts/docs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21121"
BASE_PATH = "/"
